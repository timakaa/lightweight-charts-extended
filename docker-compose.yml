services:
  redis:
    container_name: "redis"
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  minio:
    container_name: "minio"
    image: minio/minio:latest
    ports:
      - "9000:9000" # API
      - "9001:9001" # Web UI
    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin123
    command: server /data --console-address ":9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  backend:
    container_name: "backend"
    image: timakaa/lightweight-charts-extended-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - backend_data:/app/data
    depends_on:
      - redis
      - minio
    environment:
      - REDIS_URL=redis://redis:6379
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin123
      - MINIO_SECURE=false
    restart: unless-stopped

  frontend:
    container_name: "frontend"
    image: timakaa/lightweight-charts-extended-frontend:latest
    build:
      context: ./client
      dockerfile: Dockerfile
      # args:
      #   - VITE_API_URL=${VITE_API_URL:-http://100.76.193.76:8000}
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend:8000
    env_file:
      - ./client/.env
    restart: unless-stopped

volumes:
  backend_data:
  redis_data:
  minio_data:
